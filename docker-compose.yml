version: '3.9'

services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ets_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-ets_language_exams}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network-ets-test-amine

  # ─── Symfony Backend (PHP-FPM) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
      target: ${APP_ENV:-dev}
    container_name: ets_backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-changeme_in_production}
      MONGODB_URL: mongodb://${MONGO_APP_USER:-ets_user}:${MONGO_APP_PASSWORD:-ets_password}@mongodb:27017/${MONGO_DB:-ets_language_exams}
      MONGODB_DB: ${MONGO_DB:-ets_language_exams}
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-changeme_in_production}
      JWT_TTL: ${JWT_TTL:-3600}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$}
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network-ets-test-amine

  # ─── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/node/Dockerfile
      target: ${APP_ENV:-dev}
    container_name: ets_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    networks:
      - app-network-ets-test-amine

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ets_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network-ets-test-amine

volumes:
  mongodb_data:
    driver: local
  backend_vendor:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local

networks:
  app-network-ets-test-amine:
    driver: bridge
